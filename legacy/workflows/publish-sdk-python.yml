name: Publish pptx-dev (PyPI)

on:
  push:
    tags:
      - "sdk-python-v*"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry-run (skip actual publish, run build + check only)"
        type: boolean
        default: false

permissions:
  contents: read
  id-token: write # required for PyPI Trusted Publishing (OIDC)

jobs:
  build:
    name: Build sdist + wheel
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: python
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tooling
        run: python -m pip install --upgrade pip build twine

      - name: Verify tag matches package version
        if: startsWith(github.ref, 'refs/tags/sdk-python-v')
        run: |
          TAG="${GITHUB_REF_NAME#sdk-python-v}"
          PKG=$(python -c "import tomllib, pathlib; print(tomllib.loads(pathlib.Path('pyproject.toml').read_text())['project']['version'])")
          if [ "$TAG" != "$PKG" ]; then
            echo "::error::Tag version ($TAG) does not match pyproject.toml version ($PKG)"
            exit 1
          fi

      - name: Build sdist + wheel
        run: python -m build

      - name: Twine check
        run: python -m twine check dist/*

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pptx-dev-dist
          path: python/dist/*
          if-no-files-found: error

  publish:
    name: Publish to PyPI
    needs: build
    if: github.event_name != 'workflow_dispatch' || github.event.inputs.dry_run != 'true'
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/pptx-dev/
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: pptx-dev-dist
          path: dist

      - name: Publish to PyPI (Trusted Publishing)
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
          print-hash: true
