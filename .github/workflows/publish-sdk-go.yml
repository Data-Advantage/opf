name: Publish pptx.dev/go (GitHub Release)

on:
  push:
    tags:
      - "go/v*"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry-run (run checks only, skip creating GitHub Release)"
        type: boolean
        default: true

permissions:
  contents: write

jobs:
  release:
    name: Test + GitHub Release
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: go
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true
          cache-dependency-path: go/go.sum

      - name: Check formatting
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "::error::The following files are not gofmt-formatted:"
            echo "$unformatted"
            gofmt -d .
            exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: go test
        run: go test -race -count=1 ./...

      - name: Extract version from tag
        id: ver
        if: startsWith(github.ref, 'refs/tags/go/')
        run: echo "v=${GITHUB_REF_NAME#go/}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/go/') && (github.event_name != 'workflow_dispatch' || github.event.inputs.dry_run != 'true')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "pptx.dev/go ${{ steps.ver.outputs.v }}"
          generate_release_notes: true
